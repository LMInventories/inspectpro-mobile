name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node ───────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Java ───────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ────────────────────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "platforms;android-36" "build-tools;35.0.0"

      # ── 5. Gradle cache ───────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 6. Install deps ───────────────────────────────────────────
      # --legacy-peer-deps: react-native-vision-camera lists reanimated as a peer
      # dep but we don't install it (not needed for photo-only use). This flag
      # suppresses the peer-dep error without changing what actually installs.
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── 7. Prebuild ───────────────────────────────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      # Force Gradle version (prevents AGP mismatch)
      - name: Force Gradle wrapper version
        run: |
          cd android
          ./gradlew wrapper --gradle-version 8.13

      # Patch AFTER prebuild + wrapper fix
      - name: Apply Gradle patches
        run: |
          node scripts/eas-gradle-patch.js
          echo "Patch applied successfully"

      # ── 8. local.properties ───────────────────────────────────────
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      # ── 9. Build APK ──────────────────────────────────────────────
      - name: Build release APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease --no-daemon

      # ── 10. Upload ────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: inspectpro-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
